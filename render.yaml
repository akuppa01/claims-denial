services:
  - type: web
    name: claims-denial-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: CLAIMS_DOWNLOAD_DIR
        value: /tmp/claims-denial-downloads
